<!DOCTYPE html>
<html>
<head>
<title>RUMCHAT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<style>
:root{--bg:#0a0a0a;--panel:#111111;--soft:#8a8a8a;--line:#222222;--white:#ffffff;--black:#000000;--input:#1a1a1a;--msgMe:#2a2a2a;--msgOther:#1a1a1a;--blue:#4a9eff;}
.light{--bg:#ffffff;--panel:#f5f5f5;--soft:#555555;--line:#e0e0e0;--white:#000000;--black:#ffffff;--input:#f0f0f0;--msgMe:#e8e8e8;--msgOther:#f5f5f5;--blue:#0066cc;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Segoe UI,Helvetica Neue,Helvetica,sans-serif;background:var(--bg);color:var(--white);overflow:hidden;transition:.3s;}
#splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity.6s ease,visibility.6s;}
#splash.hide{opacity:0;visibility:hidden;}
@keyframes stamp{0%{transform:scale(3) rotate(-5deg);opacity:0}50%{transform:scale(.95) rotate(-5deg)}100%{transform:scale(1) rotate(-5deg);opacity:1}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
.topbar{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--line);background:var(--panel);}
.logo{font-weight:600;letter-spacing:1px;font-size:18px;}
#menuBtn{width:20px;height:16px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;margin-right:18px;padding:2px 0;}
#menuBtn div{width:100%;height:2px;background:var(--white);border-radius:1px;}
#sideMenu{position:fixed;top:0;left:-280px;width:280px;height:100%;background:var(--panel);border-right:1px solid var(--line);z-index:1000;transition:.3s;padding-top:60px;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;display:none;}
.menuItem{display:flex;align-items:center;padding:15px 25px;color:var(--white);text-decoration:none;gap:15px;cursor:pointer;font-size:15px;}
.menuItem:hover{background:var(--line);}
#menuPdp{width:22px;height:22px;border-radius:50%;object-fit:cover;}
#menuDivider{height:1px;background:var(--line);margin:10px 0;}
.profile{display:flex;align-items:center;gap:10px;}
.avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--line);}
#container{height:calc(100vh - 60px);position:relative;}
#contactsPage{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;}
#contactsHeader{padding:10px;background:var(--panel);border-bottom:1px solid var(--line);}
#online{padding:8px 10px;font-size:12px;color:var(--soft);}
#contactList{flex:1;overflow-y:auto;}
.contactItem{display:flex;align-items:center;gap:12px;padding:12px 15px;cursor:pointer;position:relative;border-bottom:1px solid var(--line);}
.contactItem:hover{background:var(--panel);}
.contactAvatar{width:49px;height:49px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:18px;flex-shrink:0;color:var(--white);}
.contactInfo{flex:1;overflow:hidden;}
.contactName{font-weight:400;font-size:16px;color:var(--white);margin-bottom:3px;}
.contactLastMsg{font-size:13px;color:var(--soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.contactTime{font-size:11px;color:var(--soft);position:absolute;right:15px;top:15px;}
.unreadBadge{background:var(--white);color:var(--black);font-size:12px;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 6px;position:absolute;right:15px;bottom:15px;font-weight:600;}
.light .unreadBadge{background:#000;color:#fff;}
#chatPage{position:absolute;inset:0;background:var(--bg);display:none;flex-direction:column;}
.chatHeader{padding:10px 16px;border-bottom:1px solid var(--line);background:var(--panel);display:flex;align-items:center;gap:12px;}
#backBtn{background:none;border:none;color:var(--white);font-size:24px;cursor:pointer;padding:0 8px 0 0;}
.chatAvatar{width:40px;height:40px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-weight:500;}
.chatName{font-weight:500;font-size:16px;}
.chatStatus{font-size:13px;color:var(--soft);}
#messages{flex:1;overflow-y:auto;padding:12px 16px 20px;display:flex;flex-direction:column;gap:2px;}
.msg{max-width:65%;padding:6px 7px 8px 9px;border-radius:7.5px;position:relative;word-wrap:break-word;font-size:14.2px;line-height:19px;box-shadow:0 1px 0.5px rgba(0,0,0,.13);}
.me{margin-left:auto;background:var(--msgMe);border-top-right-radius:0;}
.other{background:var(--msgOther);border-top-left-radius:0;}
.msgText{padding-right:60px;display:inline-block;}
.time{font-size:11px;color:var(--soft);float:right;margin:10px 0 -5px 4px;height:15px;}
#inputBar{display:flex;align-items:flex-end;padding:5px 16px 5px 10px;background:var(--panel);gap:8px;min-height:62px;position:relative;}
#attachBtn{background:none;border:none;color:var(--soft);font-size:26px;cursor:pointer;padding:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
#sendBtn{background:var(--white);color:var(--black);border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;}
.light #sendBtn{background:#000;color:#fff;}
#sendBtn:active{transform:scale(0.9);}
#msg{flex:1;background:var(--input);border:1px solid var(--line);color:var(--white);outline:none;padding:9px 12px;border-radius:8px;font-size:15px;max-height:100px;resize:none;font-family:inherit;}
#typing{font-size:13px;color:var(--soft);padding:0 16px 8px;height:21px;}
#skipSplash{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 20px;border-radius:20px;border:none;font-weight:600;z-index:10000;cursor:pointer;display:none;}
#tourOverlay{position:fixed;inset:0;z-index:99998;display:none;}
#tourSpotlight{position:absolute;border:3px solid var(--blue);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.75);transition:all.4s ease;pointer-events:none;}
#tourBox{position:absolute;background:var(--panel);border:1px solid var(--blue);border-radius:12px;padding:16px;max-width:280px;z-index:99999;box-shadow:0 8px 24px rgba(0,0,0,0.5);}
#tourText{font-size:14px;line-height:20px;margin-bottom:12px;}
#tourNav{display:flex;justify-content:space-between;align-items:center;}
#tourCount{font-size:12px;color:var(--soft);}
#tourNext{background:var(--blue);color:#fff;border:none;padding:8px 16px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px;}
#tourSkip{background:none;border:none;color:var(--soft);cursor:pointer;font-size:13px;}
#startTour{position:fixed;bottom:20px;right:20px;width:50px;height:50px;background:var(--blue);color:#fff;border:none;border-radius:50%;font-size:24px;cursor:pointer;z-index:998;box-shadow:0 4px 12px rgba(74,158,255,0.4);display:block;}
</style>
</head>

<div id="container">

    <div id="contactsHeader">
      <div style="display:flex;flex-direction:column;gap:8px;">
        <input id="name" placeholder="Ton pseudo" value="" style="width:100%;padding:10px 12px;background:var(--input);border:1px solid var(--line);color:var(--white);border-radius:8px;outline:none;font-size:14px;">
        <input id="room" placeholder="Code room" value="" style="width:100%;padding:10px 12px;background:var(--input);border:1px solid var(--line);color:var(--white);border-radius:8px;outline:none;font-size:14px;">
        <button id="saveRoomBtn" onclick="joinRoom()" style="width:100%;padding:10px 16px;background:var(--white);color:var(--black);border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px;">Entrer</button>

<script>
// SPLASH
setTimeout(()=>{const s=document.getElementById('splash');if(s&&!s.classList.contains('hide'))document.getElementById('skipSplash').style.display='block';},4000);
function hideSplash(){const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),600);}}
document.addEventListener('DOMContentLoaded',()=>{setTimeout(()=>{const splash=document.getElementById('splash');if(splash){splash.classList.add('hide');setTimeout(()=>splash.remove(),600);}},2500);});

// FIREBASE
const firebaseConfig={apiKey:"AIzaSyBEJ6u2NAjn5jjAaXNnPL67hLthjH3XW7w",authDomain:"mr-pc-chat.firebaseapp.com",databaseURL:"https://mr-pc-chat-default-rtdb.firebaseio.com",projectId:"mr-pc-chat"};
try{firebase.initializeApp(firebaseConfig);}catch(e){console.log("Firebase déjà init");}
const db=firebase.database();
const auth=firebase.auth();
const provider=new firebase.auth.GoogleAuthProvider();

let name=localStorage.getItem("name")||"";
let avatar=localStorage.getItem("avatar")||"https://ui-avatars.com/api/?name=User&background=333&color=fff";
let msgRef=null;
let currentChatId=null;

const menuBtn=document.getElementById('menuBtn');
const sideMenu=document.getElementById('sideMenu');
const overlay=document.getElementById('overlay');
const themeBtn=document.getElementById('themeBtn');
const loginBtn=document.getElementById('loginBtn');
let menuOpen=false;

function toggleMenu(){menuOpen=!menuOpen;sideMenu.style.left=menuOpen?'0':'-280px';overlay.style.display=menuOpen?'block':'none';}
menuBtn.onclick=toggleMenu;
overlay.onclick=toggleMenu;

function applyTheme(t){
  if(t==='light'){document.body.classList.add("light");themeBtn.innerHTML=themeBtn.innerHTML.replace('sombre','clair');}
  else{document.body.classList.remove("light");themeBtn.innerHTML=themeBtn.innerHTML.replace('clair','sombre');}
}
const savedTheme=localStorage.getItem('theme')||'dark';
applyTheme(savedTheme);
themeBtn.onclick=()=>{const newTheme=document.body.classList.contains("light")?'dark':'light';localStorage.setItem('theme',newTheme);applyTheme(newTheme);toggleMenu();};

loginBtn.onclick=async()=>{if(auth.currentUser){await auth.signOut();}else{try{await auth.signInWithPopup(provider);}catch(e){alert(e.message);}}toggleMenu();};

function renderContacts(contacts){
  const list=document.getElementById('contactList');
  if(!contacts||Object.keys(contacts).length===0){
    list.innerHTML='<div style="padding:20px;opacity:.5;text-align:center;font-size:12px;">Aucun chat. Entre un code room pour commencer</div>';
    return;
  }
  let html='';
  Object.keys(contacts).forEach(chatId=>{
    const c=contacts[chatId]||{};
    const safeName=(c.name||'Chat').replace(/'/g,"\\'");
    html+=`<div class="contactItem" onclick="openChat('${chatId}','${safeName}','${c.avatar||''}')">
      <div class="contactAvatar">${(c.name||'?')[0].toUpperCase()}</div>
      <div class="contactInfo">
        <div class="contactName">${c.name||'Chat'}</div>
        <div class="contactLastMsg">${c.lastMsg||'Clique pour ouvrir'}</div>
      </div>
    </div>`;
  });
  list.innerHTML=html;
}

auth.onAuthStateChanged(user=>{
  if(user){
    name=user.displayName||"User";
    avatar=user.photoURL||avatar;
    localStorage.setItem("name",name);
    localStorage.setItem("avatar",avatar);
    document.getElementById("avatar").src=avatar;
    loginBtn.innerHTML=`<label for="pdpUpload" style="cursor:pointer;display:flex;align-items:center;gap:15px;"><img id="menuPdp" src="${avatar}">${name} - Déconnexion</label>`;
    db.ref(`users/${user.uid}/contacts`).on('value',snap=>{renderContacts(snap.val()||{});},err=>{console.log('Erreur DB:',err);renderContacts({});});
  }else{
    loginBtn.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Se connecter avec Google`;
    document.getElementById('contactList').innerHTML='<div style="padding:20px;opacity:.5;text-align:center;font-size:12px;">Connecte-toi pour voir tes chats</div>';
  }
});

window.joinRoom=function(){
  const pseudo=document.getElementById('name').value.trim();
  const code=document.getElementById('room').value.trim();
  if(!pseudo)return alert('Mets ton pseudo');
  if(!code)return alert('Mets un code room');
  if(!auth.currentUser)return alert('Connecte-toi Google d\'abord chef!');
  name=pseudo;
  avatar=localStorage.getItem("avatar")||`https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=333&color=fff`;
  localStorage.setItem("name",name);
  localStorage.setItem("avatar",avatar);
  document.getElementById('avatar').src=avatar;
  const chatId=code;
  db.ref(`chats/${chatId}/users/${auth.currentUser.uid}`).set({name:name,avatar:avatar,online:true});
  db.ref(`users/${auth.currentUser.uid}/contacts/${chatId}`).set({name:'Room '+code,lastMsg:'Tu as rejoint',time:Date.now()});
  openChat(chatId,'Room '+code,'');
}

window.openChat=function(chatId,cName,cAvatar){
  try{
    currentChatId=chatId;
    document.getElementById('contactsPage').style.display='none';
    document.getElementById('chatPage').style.display='flex';
    document.getElementById('chatName').innerText=cName;
    document.getElementById('chatAvatar').innerText=cName[0].toUpperCase();
    document.getElementById('chatStatus').innerText='En ligne';
    document.getElementById('messages').innerHTML='<div style="padding:20px;opacity:.5;text-align:center;">Chargement...</div>';
    if(msgRef)msgRef.off();
    msgRef=db.ref(`chats/${chatId}/messages`);
    msgRef.limitToLast(50).on('child_added',snap=>{
      const m=snap.val();
      if(!m)return;
      addMsg(m.text||'',m.name||'User',m.time||Date.now(),m.uid===auth.currentUser?.uid);
    },err=>{
      console.log('Erreur messages:',err);
      document.getElementById('messages').innerHTML='<div style="padding:20px;opacity:.5;text-align:center;">Erreur chargement</div>';
    });
    setTimeout(()=>{
      if(document.getElementById('messages').innerText==='Chargement...'){
        document.getElementById('messages').innerHTML='<div style="padding:20px;opacity:.5;text-align:center;">Début de la conversation</div>';
      }
    },2000);
  }catch(e){
    console.log('Erreur openChat:',e);
    alert('Erreur ouverture chat: '+e.message);
  }
}

function addMsg(text,sender,time,isMe){
  const msgDiv=document.createElement('div');
  msgDiv.className='msg '+(isMe?'me':'other');
  const date=new Date(time);
  const timeStr=date.getHours().toString().padStart(2,'0')+':'+date.getMinutes().toString().padStart(2,'0');
  msgDiv.innerHTML=`<div class="msgText">${text}</div><span class="time">${timeStr}</span>`;
  const messages=document.getElementById('messages');
  if(messages.innerText.includes('Chargement')||messages.innerText.includes('Début')){
    messages.innerHTML='';
  }
  messages.appendChild(msgDiv);
  messages.scrollTop=messages.scrollHeight;
}

document.getElementById('sendBtn').onclick=function(){
  const text=document.getElementById('msg').value.trim();
  if(!text||!currentChatId||!auth.currentUser)return;
  db.ref(`chats/${currentChatId}/messages`).push({text:text,name:name,uid:auth.currentUser.uid,time:Date.now()});
  db.ref(`users/${auth.currentUser.uid}/contacts/${currentChatId}`).update({lastMsg:text,time:Date.now()});
  document.getElementById('msg').value='';
}

document.getElementById('msg').onkeypress=function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();document.getElementById('sendBtn').click();}
}

window.leaveRoom=function(){if(msgRef)msgRef.off();currentChatId=null;}
document.getElementById('backBtn').onclick=()=>{document.getElementById('chatPage').style.display='none';document.getElementById('contactsPage').style.display='flex';leaveRoom();};

// VISITE GUIDÉE
(function(){
let currentStep=0;
const steps=[
  {element:'#menuBtn',text:'ÉTAPE 1 : Clique ici pour ouvrir le menu et te connecter avec Google'},
  {element:'#name',text:'ÉTAPE 2 : Écris ton pseudo ici. Exemple: MRPC'},
  {element:'#room',text:'ÉTAPE 3 : Choisis un code room. Ceux qui mettent le MÊME code parlent ensemble'},
  {element:'#saveRoomBtn',text:'ÉTAPE 4 : Clique Entrer pour rejoindre le chat'}
];
function toggleGuideBtn(show){const btn=document.getElementById('startTour');if(btn)btn.style.display=show?'block':'none';}
window.startGuide=function(){
  localStorage.removeItem('tourDone');
  document.getElementById('chatPage').style.display='none';
  document.getElementById('contactsPage').style.display='flex';
  if(typeof leaveRoom==='function')leaveRoom();
  toggleGuideBtn(true);
  currentStep=0;
  document.getElementById('tourOverlay').style.display='block';
  setTimeout(showStep,100);
}
function showStep(){
  if(currentStep>=steps.length)return endGuide();
  const step=steps[currentStep];
  const el=document.querySelector(step.element);
  if(!el||el.offsetParent===null){nextStep();return;}
  const rect=el.getBoundingClientRect();
  const spotlight=document.getElementById('tourSpotlight');
  const box=document.getElementById('tourBox');
  spotlight.style.top=rect.top-8+'px';
  spotlight.style.left=rect.left-8+'px';
  spotlight.style.width=rect.width+16+'px';
  spotlight.style.height=rect.height+16+'px';
  let boxTop=rect.bottom+15;
  let boxLeft=rect.left;
  if(boxTop+150>window.innerHeight)boxTop=rect.top-165;
  if(boxLeft+280>window.innerWidth)boxLeft=window.innerWidth-300;
  if(boxLeft<10)boxLeft=10;
  box.style.top=boxTop+'px';
  box.style.left=boxLeft+'px';
  document.getElementById('tourText').innerText=step.text;
  document.getElementById('tourCount').innerText=`${currentStep+1}/${steps.length}`;
  document.getElementById('tourNext').innerText=currentStep===steps.length-1?'Terminer':'Suivant';
}
window.nextStep=function(){currentStep++;showStep();}
window.endGuide=function(){
  document.getElementById('tourOverlay').style.display='none';
  localStorage.setItem('tourDone','1');
}
document.addEventListener('DOMContentLoaded',()=>{
  setTimeout(()=>{if(!localStorage.getItem('tourDone'))startGuide();},3500);
  const checkChat=setInterval(()=>{
    const chatPage=document.getElementById('chatPage');
    if(chatPage){
      const observer=new MutationObserver(()=>{
        const isInChat=chatPage.style.display==='flex';
        toggleGuideBtn(!isInChat);
      });
      observer.observe(chatPage,{attributes:true,attributeFilter:['style']});
      toggleGuideBtn(chatPage.style.display!=='flex');
      clearInterval(checkChat);
    }
  },100);
});
})();
</script>
