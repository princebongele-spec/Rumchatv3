<!DOCTYPE html>
<html>
<head>
<title>RUMCHAT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<style>
:root{--bg:#0a0a0a;--panel:#111111;--soft:#8a8a8a;--line:#222222;--white:#ffffff;--black:#000000;--input:#1a1a1a;--msgMe:#2a2a2a;--msgOther:#1a1a1a;--blue:#4a9eff;}
.light{--bg:#ffffff;--panel:#f5f5f5;--soft:#555555;--line:#e0e0e0;--white:#000000;--black:#ffffff;--input:#f0f0f0;--msgMe:#e8e8;--msgOther:#f5f5f5;--blue:#0066cc;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Segoe UI,Helvetica Neue,Helvetica,sans-serif;background:var(--bg);color:var(--white);overflow:hidden;transition:.3s;}
#splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity.6s ease,visibility.6s;}
#splash.hide{opacity:0;visibility:hidden;}
@keyframes stamp{0%{transform:scale(3) rotate(-5deg);opacity:0}50%{transform:scale(.95) rotate(-5deg)}100%{transform:scale(1) rotate(-5deg);opacity:1}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
.topbar{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--line);background:var(--panel);}
.logo{font-weight:600;letter-spacing:1px;font-size:18px;}
#menuBtn{width:20px;height:16px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;margin-right:18px;padding:2px 0;}
#menuBtn div{width:100%;height:2px;background:var(--white);border-radius:1px;}
#sideMenu{position:fixed;top:0;left:-280px;width:280px;height:100%;background:var(--panel);border-right:1px solid var(--line);z-index:1000;transition:.3s;padding-top:60px;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;display:none;}
.menuItem{display:flex;align-items:center;padding:15px 25px;color:var(--white);text-decoration:none;gap:15px;cursor:pointer;font-size:15px;}
.menuItem:hover{background:var(--line);}
#menuPdp{width:22px;height:22px;border-radius:50%;object-fit:cover;}
#menuDivider{height:1px;background:var(--line);margin:10px 0;}
.profile{display:flex;align-items:center;gap:10px;}
.avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--line);}
#container{height:calc(100vh - 60px);position:relative;}
#contactsPage{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;}
#contactsHeader{padding:10px;background:var(--panel);border-bottom:1px solid var(--line);}
#online{padding:8px 10px;font-size:12px;color:var(--soft);}
#contactList{flex:1;overflow-y:auto;}
.contactItem{display:flex;align-items:center;gap:12px;padding:12px 15px;cursor:pointer;position:relative;border-bottom:1px solid var(--line);}
.contactItem:hover{background:var(--panel);}
.contactAvatar{width:49px;height:49px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:18px;flex-shrink:0;color:var(--white);}
.contactInfo{flex:1;overflow:hidden;}
.contactName{font-weight:400;font-size:16px;color:var(--white);margin-bottom:3px;}
.contactLastMsg{font-size:13px;color:var(--soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.contactTime{font-size:11px;color:var(--soft);position:absolute;right:15px;top:15px;}
.unreadBadge{background:var(--white);color:var(--black);font-size:12px;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 6px;position:absolute;right:15px;bottom:15px;font-weight:600;}
.light .unreadBadge{background:#000;color:#fff;}
#chatPage{position:absolute;inset:0;background:var(--bg);display:none;flex-direction:column;}
.chatHeader{padding:10px 16px;border-bottom:1px solid var(--line);background:var(--panel);display:flex;align-items:center;gap:12px;}
#backBtn{background:none;border:none;color:var(--white);font-size:24px;cursor:pointer;padding:0 8px 0 0;}
.chatAvatar{width:40px;height:40px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-weight:500;}
.chatName{font-weight:500;font-size:16px;}
.chatStatus{font-size:13px;color:var(--soft);}
#messages{flex:1;overflow-y:auto;padding:12px 16px 20px;display:flex;flex-direction:column;gap:2px;}
.msg{max-width:65%;padding:6px 7px 8px 9px;border-radius:7.5px;position:relative;word-wrap:break-word;font-size:14.2px;line-height:19px;box-shadow:0 1px 0.5px rgba(0,0,0,.13);}
.me{margin-left:auto;background:var(--msgMe);border-top-right-radius:0;}
.other{background:var(--msgOther);border-top-left-radius:0;}
.msgText{padding-right:60px;display:inline-block;}
.time{font-size:11px;color:var(--soft);float:right;margin:10px 0 -5px 4px;height:15px;}
.edited{font-size:11px;color:var(--soft);margin-left:4px;}
.msgMenu{position:absolute;top:-32px;right:0;display:none;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,0.3);z-index:5;}
.msg:hover .msgMenu{display:flex;}
.msgMenu button{background:none;border:none;color:var(--white);cursor:pointer;font-size:12px;padding:6px 10px;border-radius:4px;white-space:nowrap;}
.msgMenu button:hover{background:var(--bg);}
.replyBox{background:rgba(255,255,255,0.05);border-left:4px solid var(--blue);padding:4px 8px 6px;margin-bottom:4px;border-radius:4px;font-size:13px;}
.light .replyBox{background:rgba(0,0,0,0.05);}
.replyName{color:var(--blue);font-weight:500;font-size:12.5px;margin-bottom:2px;}
.reactions{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.reaction{background:var(--panel);padding:3px 7px;border-radius:12px;font-size:13px;cursor:pointer;border:1px solid var(--line);}
.reaction.me{background:var(--bg);}
.editInput{width:100%;background:var(--input);border:1px solid var(--line);color:var(--white);padding:6px 8px;border-radius:4px;outline:none;font-size:14.2px;}
#inputBar{display:flex;align-items:flex-end;padding:5px 16px 5px 10px;background:var(--panel);gap:8px;min-height:62px;position:relative;}
.attachItem{display:flex;align-items:center;gap:10px;padding:12px;cursor:pointer;border-radius:8px;}
.attachItem:hover{background:var(--bg);}
#recordingBar{position:absolute;left:10px;right:10px;bottom:5px;top:5px;background:var(--panel);display:none;align-items:center;justify-content:space-between;padding:0 15px;border-radius:8px;z-index:10;border:1px solid var(--line);}
#recordingDot{width:10px;height:10px;background:#ff3b30;border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
#cancelRecord{color:var(--soft);font-size:15px;display:flex;align-items:center;gap:8px;}
#recTimeDisplay{color:var(--white);font-size:15px;font-weight:500;}
.voice{display:flex;align-items:center;gap:8px;min-width:200px;padding-right:60px;}
.voiceBtn{width:32px;height:32px;border-radius:50%;background:none;border:none;color:var(--white);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.voiceWave{flex:1;height:32px;display:flex;align-items:center;gap:2px;}
.voiceWaveBar{width:3px;background:var(--soft);border-radius:1.5px;opacity:.5;}
.voiceDuration{font-size:11px;color:var(--soft);min-width:35px;}
.checkmarks{margin-left:4px;font-size:14px;display:inline-block;vertical-align:middle;color:var(--soft);}
.checkmarks.blue{color:var(--blue);}
#attachBtn{background:none;border:none;color:var(--soft);font-size:26px;cursor:pointer;padding:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
#sendBtn{background:var(--white);color:var(--black);border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;}
.light #sendBtn{background:#000;color:#fff;}
#sendBtn:active{transform:scale(0.9);}
#msg{flex:1;background:var(--input);border:1px solid var(--line);color:var(--white);outline:none;padding:9px 12px;border-radius:8px;font-size:15px;max-height:100px;resize:none;font-family:inherit;}
#typing{font-size:13px;color:var(--soft);padding:0 16px 8px;height:21px;}
#skipSplash{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 20px;border-radius:20px;border:none;font-weight:600;z-index:10000;cursor:pointer;display:none;}
</style>
</head>

<script>
// SPLASH + BOUTON SECOURS
setTimeout(()=>{
  const s = document.getElementById('splash');
  if(s &&!s.classList.contains('hide')) document.getElementById('skipSplash').style.display = 'block';
}, 4000);

function hideSplash(){
  const s = document.getElementById('splash');
  if(s){ s.classList.add('hide'); setTimeout(()=>s.remove(),600); }
}

document.addEventListener('DOMContentLoaded',()=>{
  setTimeout(()=>{
    const splash = document.getElementById('splash');
    if(splash){
      splash.classList.add('hide');
      setTimeout(()=>splash.remove(),600);
    }
  },2500);
});

// FIREBASE
const firebaseConfig={
  apiKey:"AIzaSyBEJ6u2NAjn5jjAaXNnPL67hLthjH3XW7w",
  authDomain:"mr-pc-chat.firebaseapp.com",
  databaseURL:"https://mr-pc-chat-default-rtdb.firebaseio.com",
  projectId:"mr-pc-chat"
};
try{
  firebase.initializeApp(firebaseConfig);
}catch(e){console.log("Firebase déjà init");}
const db=firebase.database();
const auth=firebase.auth();
const provider=new firebase.auth.GoogleAuthProvider();

let name=localStorage.getItem("name")||"";
let avatar=localStorage.getItem("avatar")||"https://ui-avatars.com/api/?name=User&background=333&color=fff";

let room=null;
let msgRef=null;
let currentChatId=null;
let replyingTo=null;
let contactName="";
let contactAvatar="";
const menuBtn=document.getElementById('menuBtn');
const sideMenu=document.getElementById('sideMenu');
const overlay=document.getElementById('overlay');
const themeBtn=document.getElementById('themeBtn');
const loginBtn=document.getElementById('loginBtn');
let menuOpen=false;

function toggleMenu(){
  menuOpen=!menuOpen;
  sideMenu.style.left=menuOpen?'0':'-280px';
  overlay.style.display=menuOpen?'block':'none';
}
menuBtn.onclick=toggleMenu;
overlay.onclick=toggleMenu;

function applyTheme(t){
  if(t==='light'){
    document.body.classList.add("light");
    themeBtn.innerHTML=themeBtn.innerHTML.replace('sombre','clair');
  }else{
    document.body.classList.remove("light");
    themeBtn.innerHTML=themeBtn.innerHTML.replace('clair','sombre');
  }
}
const savedTheme=localStorage.getItem('theme')||'dark';
applyTheme(savedTheme);
themeBtn.onclick=()=>{
  const newTheme=document.body.classList.contains("light")?'dark':'light';
  localStorage.setItem('theme',newTheme);
  applyTheme(newTheme);
  toggleMenu();
};

loginBtn.onclick=async()=>{
  if(auth.currentUser){
    await auth.signOut();
  }else{
    try{await auth.signInWithPopup(provider);}catch(e){alert(e.message);}
  }
  toggleMenu();
};

auth.onAuthStateChanged(user=>{
  if(user){
    name=user.displayName;
    avatar=user.photoURL||avatar;
    localStorage.setItem("name",name);
    localStorage.setItem("avatar",avatar);
    document.getElementById("avatar").src=avatar;
    loginBtn.innerHTML=`<label for="pdpUpload" style="cursor:pointer;display:flex;align-items:center;gap:15px;"><img id="menuPdp" src="${avatar}">${name} - Déconnexion</label>`;
    db.ref(`users/${user.uid}/contacts`).on('value',snap=>{
      renderContacts(snap.val()||{});
    });
  }else{

// ROOM SYSTEM
function joinRoom(){
  const pseudo = document.getElementById('name').value.trim();
  const code = document.getElementById('room').value.trim();
  if(!pseudo) return alert('Mets ton pseudo');
  if(!code) return alert('Mets un code room');
  if(!auth.currentUser) return alert('Connecte-toi Google d\'abord chef!');

  name = pseudo;
  avatar = localStorage.getItem("avatar")||`https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=333&color=fff`;
  localStorage.setItem("name",name);
  localStorage.setItem("avatar",avatar);
  document.getElementById("avatar").src=avatar;

  openChat(code, code, '');
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('name').value = localStorage.getItem("name")||"";
});

document.getElementById('backBtn').onclick = () => {
  document.getElementById('chatPage').style.display = 'none';
  document.getElementById('contactsPage').style.display = 'flex';
  leaveRoom();
};

// DISCUSSIONS
function renderContacts(contacts){
  const list=document.getElementById('contactList');
  list.innerHTML='';
  const sorted=Object.entries(contacts).sort((a,b)=>(b[1].time||0)-(a[1].time||0));
  if(sorted.length===0){
    list.innerHTML='<div style="padding:20px;opacity:.5;text-align:center;font-size:12px;">Aucune discussion<br>Rejoins une room pour commencer</div>';
    return;
  }
  sorted.forEach(([chatId,data])=>{
    const div=document.createElement('div');
    div.className='contactItem';
    div.onclick=()=>openChat(chatId,data.contactName||data.code,data.contactAvatar);
    const initial=(data.contactName||data.code)[0].toUpperCase();
    const timeStr = data.time? new Date(data.time).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
    const unread = data.unread || 0;
    const avatarHtml = data.contactAvatar? `<img src="${data.contactAvatar}" style="width:49px;height:49px;border-radius:50%;object-fit:cover;">` : `<div class="contactAvatar">${initial}</div>`;
    div.innerHTML=`${avatarHtml}<div class="contactInfo"><div class="contactName">${data.contactName||data.code}</div><div class="contactLastMsg">${data.lastMsg||'Nouveau chat'}</div></div><div class="contactTime">${timeStr}</div>${unread>0?`<div class="unreadBadge">${unread}</div>`:''}`;
    list.appendChild(div);
  });
}

function openChat(chatId,cName,cAvatar){
  if(!auth.currentUser) return alert('Connecte-toi Google d\'abord chef!');
  leaveRoom();
  currentChatId=chatId;
  room=chatId;
  contactName=cName||chatId;
  contactAvatar=cAvatar;
  document.getElementById('contactsPage').style.display='none';
  document.getElementById('chatPage').style.display='flex';
  document.getElementById('chatName').innerText=contactName;
  document.getElementById('chatAvatar').innerHTML = cAvatar? `<img src="${cAvatar}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">` : contactName[0].toUpperCase();
  db.ref(`users/${auth.currentUser.uid}/contacts/${chatId}/unread`).set(0);
  msgRef=db.ref("rooms/"+room+"/messages");
  msgRef.off();
  msgRef.on("child_added",snap=>{
    const d=snap.val();
    show(d,snap.key);
    if(auth.currentUser && d.name!==name) markAsRead(snap.key);
    if(auth.currentUser)saveContact(room,d);
  });
  msgRef.on("child_changed",snap=>{updateMessage(snap.key,snap.val());});
  msgRef.on("child_removed",snap=>{document.querySelector(`[data-key="${snap.key}"]`)?.remove();});
  db.ref("rooms/"+room+"/online/"+name).set(true);
  db.ref("rooms/"+room+"/online/"+name).onDisconnect().remove();
  db.ref("rooms/"+room+"/online").on("value",snap=>{
    let users=Object.keys(snap.val()||{});
    let n=users.length;
    document.getElementById("online").innerText=n+" en ligne";
    let otherUsers = users.filter(u=>u!==name);
    document.getElementById("chatStatus").innerText=otherUsers.length>0?"en ligne":"hors ligne";
  });
  db.ref("rooms/"+room+"/typing").on("value",snap=>{
    let typers = Object.keys(snap.val()||{}).filter(u=>u!==name);
    document.getElementById("typing").innerText = typers.length? `${typers.join(', ')} écrit...` : '';
  });
}

function saveContact(code,lastMsgData){
  if(!auth.currentUser)return;
  let preview='Nouveau chat';
  if(lastMsgData.text)preview=lastMsgData.text;
  if(lastMsgData.image)preview='📷 Photo';
  if(lastMsgData.video)preview='🎥 Vidéo';
  if(lastMsgData.file)preview='📎 Fichier';
  if(lastMsgData.audio)preview='🎤 Message vocal';
  if(lastMsgData.deleted)preview='Message supprimé';
  let cName = lastMsgData.name===name? code : lastMsgData.name;
  let cAvatar = lastMsgData.name===name? '' : lastMsgData.avatar;
  const contactData={
    code:code,
    contactName:cName,
    contactAvatar:cAvatar,
    lastMsg:`${lastMsgData.name}: ${preview}`,
    time:Date.now()
  };
  db.ref(`users/${auth.currentUser.uid}/contacts/${code}`).update(contactData);
  if(lastMsgData.name!==name){
    db.ref(`users/${auth.currentUser.uid}/contacts/${code}/unread`).transaction(c=>(c||0)+1);
  }
}

function markAsRead(msgKey){
  if(!auth.currentUser)return;
  db.ref("rooms/"+room+"/messages/"+msgKey+"/readBy/"+auth.currentUser.uid).set(true);
}

function leaveRoom(){
  if(msgRef)msgRef.off();
  if(room){
    db.ref("rooms/"+room+"/online/"+name).remove();
    db.ref("rooms/"+room+"/typing/"+name).remove();
  }
  document.getElementById("messages").innerHTML="";
  room=null;
  currentChatId=null;
  cancelReply();
}

function send(){
  if(!room)return;
  if(!auth.currentUser) return alert('Connecte-toi Google chef!');
  let text=document.getElementById("msg").value.trim();
  if(!text)return;
  const msgData={
    name:name,
    avatar:avatar,
    text:text,
    time:Date.now(),
    replyTo: replyingTo,
    readBy: {[auth.currentUser.uid]: true}
  };
  db.ref("rooms/"+room+"/messages").push(msgData).catch(e=>alert('Erreur: '+e.message));
  saveContact(room,msgData);
  document.getElementById("msg").value="";
  handleInput();
  cancelReply();
  db.ref("rooms/"+room+"/typing/"+name).remove();
}
function show(d,key){
  let div=document.createElement("div");
  div.className="msg "+(d.name==name?"me":"other");
  div.dataset.key=key;
  div.dataset.time=d.time;
  let replyHtml = '';
  if(d.replyTo){
    replyHtml = `<div class="replyBox"><div class="replyName">${d.replyTo.name}</div>${d.replyTo.text||'📎 Media'}</div>`;
  }
  let content = '';
  if(d.deleted){
    content = `<i style="opacity:0.6">Ce message a été supprimé</i>`;
  }else{
    if(d.text) content = `<span class="msgText">${d.text}</span>`;
    if(d.edited) content += `<span class="edited">Modifié</span>`;
    if(d.audio){
      const duration = d.duration || 0;
      const m = Math.floor(duration/60);
      const s = duration%60;
      const timeStr = m+":"+(s<10?"0"+s:s);
      let bars = '';
      for(let i=0;i<30;i++){
        const h = 3 + Math.random()*20;
        bars += `<div class="voiceWaveBar" style="height:${h}px"></div>`;
      }
      content = `<div class="voice"><button class="voiceBtn" onclick="playVoice(this)">▶</button><div class="voiceWave">${bars}</div><span class="voiceDuration">${timeStr}</span><audio src="${d.audio}" preload="metadata"></audio></div>`;
    }
    if(d.image) content = `<img src="${d.image}" style="max-width:280px;border-radius:6px;margin-top:4px;cursor:pointer;" onclick="window.open('${d.image}')">`;
    if(d.video) content = `<video src="${d.video}" controls style="max-width:280px;border-radius:6px;margin-top:4px;"></video>`;
    if(d.file) content = `<a href="${d.file}" target="_blank" style="color:var(--blue);text-decoration:none;display:flex;align-items:center;gap:8px;padding:8px;background:rgba(255,255,255,0.05);border-radius:6px;border:1px solid var(--line);"><svg width="24" height="24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0.55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>${d.fileName}</a>`;
  }
  let reactionsHtml = '';
  if(d.reactions){
    reactionsHtml = '<div class="reactions">';
    Object.entries(d.reactions).forEach(([emoji,users])=>{
      const isMe = auth.currentUser && users[auth.currentUser.uid];
      reactionsHtml += `<div class="reaction ${isMe?'me':''}" onclick="toggleReaction('${key}','${emoji}')">${emoji} ${Object.keys(users).length}</div>`;
    });
    reactionsHtml += '</div>';
  }
  let checkmarks = '';
  if(d.name==name && d.readBy){
    const readCount = Object.keys(d.readBy).length;
    checkmarks = `<span class="checkmarks ${readCount>1?'blue':''}">${readCount>1?'✓✓':'✓'}</span>`;
  }
  let msgTime = new Date(d.time);
  let diffMinutes = (new Date() - msgTime) / 1000 / 60;
  let menuHtml = '';
  if(!d.deleted){
    menuHtml = `<div class="msgMenu"><button onclick="replyMsg('${key}')">Répondre</button><button onclick="reactMsg('${key}','❤️')">❤️</button><button onclick="reactMsg('${key}','😂')">😂</button>${d.name==name && d.text && diffMinutes < 50?`<button onclick="editMsg('${key}')">Modifier</button><button onclick="deleteMsg('${key}')">Supprimer</button>`:''}</div>`;
  }
  div.innerHTML=`${menuHtml}${replyHtml}${content}<span class="time">${new Date(d.time).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}${checkmarks}</span>${reactionsHtml}`;
  let m=document.getElementById("messages");
  m.appendChild(div);
  m.scrollTop=m.scrollHeight;
  if(d.name!==name && document.hidden===false) document.getElementById('notifSound').play().catch(()=>{});
}

function updateMessage(key,d){
  let msgDiv=document.querySelector(`[data-key="${key}"]`);
  if(!msgDiv) return;
  msgDiv.remove();
  show(d,key);
}

function replyMsg(key){
  db.ref("rooms/"+room+"/messages/"+key).once("value",snap=>{
    let d=snap.val();
    replyingTo = {key:key, name:d.name, text:d.text||d.fileName||'Vocal'};
    document.getElementById('inputBar').insertAdjacentHTML('beforebegin',`<div id="replyPreview" style="background:var(--panel);padding:8px 16px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;"><div style="flex:1;"><div style="font-size:12.5px;color:var(--blue);font-weight:500;">Répondre à ${d.name}</div><div style="font-size:13px;color:var(--soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d.text||d.fileName||'🎤 Message vocal'}</div></div><button onclick="cancelReply()" style="background:none;border:none;color:var(--soft);cursor:pointer;font-size:20px;padding:4px;">✕</button></div>`);
    document.getElementById('msg').focus();
  });
}

function cancelReply(){
  replyingTo = null;
  document.getElementById('replyPreview')?.remove();
}

function reactMsg(key,emoji){
  if(!auth.currentUser)return;
  const uid = auth.currentUser.uid;
  const ref = db.ref("rooms/"+room+"/messages/"+key+"/reactions/"+emoji+"/"+uid);
  ref.once("value",snap=>{
    if(snap.exists()) ref.remove();
    else ref.set(true);
  });
}

function toggleReaction(key,emoji){reactMsg(key,emoji);}

function editMsg(key){
  db.ref("rooms/"+room+"/messages/"+key).once("value",snap=>{
    let d=snap.val();
    let diffMinutes = (new Date() - new Date(d.time)) / 1000 / 60;
    if(diffMinutes >= 50) return alert("Tu peux plus modifier, 50 min dépassées");
    let msgDiv=document.querySelector(`[data-key="${key}"]`);
    let textSpan=msgDiv.querySelector('.msgText');
    let oldText=textSpan.innerText;
    textSpan.innerHTML=`<div style="display:flex;gap:6px;align-items:center;"><input class="editInput" value="${oldText}" style="flex:1;"><button onclick="validerEdit('${key}')" style="background:var(--white);border:none;color:var(--black);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;">✓</button><button onclick="annulerEdit('${key}')" style="background:var(--line);border:none;color:var(--white);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;">✕</button></div>`;
    let input=msgDiv.querySelector('.editInput');
    input.focus();
    input.select();
    input.dataset.oldText = oldText;
    input.onkeydown=e=>{
      if(e.key=="Enter") validerEdit(key);
      if(e.key=="Escape") annulerEdit(key);
    };
  });
}

function validerEdit(key){
  let msgDiv=document.querySelector(`[data-key="${key}"]`);
  let input=msgDiv.querySelector('.editInput');
  let newText=input.value.trim();
  let oldText=input.dataset.oldText;
  if(newText && newText!==oldText){
    db.ref("rooms/"+room+"/messages/"+key).update({text:newText,edited:true});
  }else{
    annulerEdit(key);
  }
}

function annulerEdit(key){
  db.ref("rooms/"+room+"/messages/"+key).once("value",snap=>{
    updateMessage(key,snap.val());
  });
}

function deleteMsg(key){
  db.ref("rooms/"+room+"/messages/"+key).once("value",snap=>{
    let d=snap.val();
    let diffMinutes = (new Date() - new Date(d.time)) / 1000 / 60;
    if(diffMinutes >= 50) return alert("Tu peux plus supprimer, 50 min dépassées");
    if(confirm("Supprimer ce message pour tout le monde?")){
      db.ref("rooms/"+room+"/messages/"+key).update({text:null,audio:null,image:null,video:null,file:null,fileName:null,edited:null,deleted:true,reactions:null,replyTo:null,duration:null});
    }
  });
}

let currentAudio = null;
let currentBtn = null;
function playVoice(btn){
  let voice=btn.parentElement;
  let audio=voice.querySelector("audio");
  let bars=voice.querySelectorAll(".voiceWaveBar");
  if(currentAudio && currentAudio!== audio){
    currentAudio.pause();
    if(currentBtn) currentBtn.innerHTML="▶";
  }
  if(audio.paused){
    audio.play();
    btn.innerHTML="⏸";
    currentAudio = audio;
    currentBtn = btn;
    audio.ontimeupdate=()=>{
      let progress = audio.currentTime / audio.duration;
      let activeBars = Math.floor(progress * bars.length);
      bars.forEach((bar,i)=>{
        bar.style.opacity = i < activeBars? '1' : '.3';
        bar.style.background = i < activeBars? 'var(--white)' : 'var(--soft)';
      });
    };
    audio.onended=()=>{
      btn.innerHTML="▶";
      bars.forEach(bar=>{
        bar.style.opacity = '.5';
        bar.style.background = 'var(--soft)';
      });
      currentAudio = null;
      currentBtn = null;
    };
  }else{
    audio.pause();
    btn.innerHTML="▶";
    currentAudio = null;
    currentBtn = null;
  }
}

const attachBtn = document.getElementById('attachBtn');
const attachMenu = document.getElementById('attachMenu');
const sendBtn = document.getElementById('sendBtn');
const msgInput = document.getElementById('msg');
const recordingBar = document.getElementById('recordingBar');
const recTimeDisplay = document.getElementById('recTimeDisplay');
let isRecording = false;
let startX = 0;
let cancelRecord = false;
let typingTimeout;
let recorder, chunks=[], stream, recTimer, recSeconds=0;

attachBtn.onclick = (e) => {
  e.stopPropagation();
  attachMenu.style.display = attachMenu.style.display === 'flex'? 'none' : 'flex';
};
document.addEventListener('click', () => attachMenu.style.display = 'none');

function handleInput(){
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight,100) + 'px';
  const hasText = msgInput.value.trim().length > 0;
  sendBtn.innerHTML = hasText? '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>' : '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>';
  if(room && auth.currentUser){
    db.ref("rooms/"+room+"/typing/"+name).set(true);
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(()=>{
      db.ref("rooms/"+room+"/typing/"+name).remove();
    },2000);
  }
}

sendBtn.onclick = () => {
  if(msgInput.value.trim().length > 0 &&!isRecording){
    send();
  }
};

sendBtn.addEventListener('mousedown', startRecordPress);
sendBtn.addEventListener('touchstart', startRecordPress);
sendBtn.addEventListener('mouseup', stopRecordPress);
sendBtn.addEventListener('touchend', stopRecordPress);
sendBtn.addEventListener('touchmove', handleRecordMove);
sendBtn.addEventListener('mousemove', handleRecordMove);

async function startRecordPress(e){
  if(msgInput.value.trim().length > 0) return;
  e.preventDefault();
  if(!room) return alert('Ouvre un chat d\'abord');
  if(!auth.currentUser) return alert('Connecte-toi Google chef!');
  isRecording = true;
  cancelRecord = false;
  startX = e.touches? e.touches[0].clientX : e.clientX;
  recordingBar.style.display = 'flex';
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recorder=new MediaRecorder(stream);
    chunks=[];
    recorder.ondataavailable=e=>{chunks.push(e.data);};
    recorder.start();
    recSeconds=0;
    recTimer=setInterval(()=>{
      recSeconds++;
      let m=Math.floor(recSeconds/60);
      let s=recSeconds%60;
      recTimeDisplay.innerText=m+":"+(s<10?"0"+s:s);
    },1000);
  }catch(err){
    alert('Micro refusé');
    stopRecordPress();
  }
}

function handleRecordMove(e){
  if(!isRecording) return;
  const currentX = e.touches? e.touches[0].clientX : e.clientX;
  const diff = startX - currentX;
  if(diff > 80){
    cancelRecord = true;
    document.getElementById('cancelRecord').style.color = '#ff3b30';
    document.getElementById('cancelRecord').innerHTML = '🗑️ Relâchez pour annuler';
  }else{
    cancelRecord = false;
    document.getElementById('cancelRecord').style.color = 'var(--soft)';
    document.getElementById('cancelRecord').innerHTML = '◀ Glissez pour annuler';
  }
}

function stopRecordPress(){
  if(!isRecording) return;
  isRecording = false;
  recordingBar.style.display = 'none';
  document.getElementById('cancelRecord').style.color = 'var(--soft)';
  document.getElementById('cancelRecord').innerHTML = '◀ Glissez pour annuler';
  clearInterval(recTimer);
  if(!recorder) return;
  recorder.stop();
  recorder.onstop=async()=>{
    if(cancelRecord || recSeconds < 1){
      stream.getTracks().forEach(track=>track.stop());
      return;
    }
    let blob=new Blob(chunks,{type:"audio/webm"});
    let reader = new FileReader();
    reader.onload = () => {
      const msgData={
        name:name,
        avatar:avatar,
        audio:reader.result,
        duration:recSeconds,
        time:Date.now(),
        replyTo: replyingTo,
        readBy: {[auth.currentUser.uid]: true}
      };
      db.ref("rooms/"+room+"/messages").push(msgData);
      if(auth.currentUser)saveContact(room,msgData);
      cancelReply();
    };
    reader.readAsDataURL(blob);
    stream.getTracks().forEach(track=>track.stop());
  };
}

async function uploadCatbox(file){
  let form = new FormData();
  form.append('reqtype','fileupload');
  form.append('fileToUpload',file);
  let res = await fetch('https://catbox.moe/user/api.php',{method:'POST',body:form});
  return await res.text();
}

async function uploadFile(file, type){
  if(!room) return alert('Ouvre un chat d\'abord');
  if(!auth.currentUser) return alert('Connecte-toi Google chef!');
  if(file.size > 200*1024*1024) return alert('Fichier trop lourd, max 200 Mo sur Catbox');

  if(type==='image' && file.size <= 2*1024*1024){
    let reader = new FileReader();
    reader.onload = () => {
      const msgData={
        name:name,
        avatar:avatar,
        [type]:reader.result,
        fileName: file.name,
        time:Date.now(),
        replyTo: replyingTo,
        readBy: {[auth.currentUser.uid]: true}
      };
      db.ref("rooms/"+room+"/messages").push(msgData);
      if(auth.currentUser)saveContact(room,msgData);
      attachMenu.style.display = 'none';
      cancelReply();
    };
    reader.readAsDataURL(file);
  } else {
    attachMenu.style.display = 'none';
    document.getElementById('typing').innerText = 'Upload en cours...';
    try{
      const url = await uploadCatbox(file);
      const msgData={
        name:name,
        avatar:avatar,
        [type]:url,
        fileName: file.name,
        time:Date.now(),
        replyTo: replyingTo,
        readBy: {[auth.currentUser.uid]: true}
      };
      db.ref("rooms/"+room+"/messages").push(msgData);
      if(auth.currentUser)saveContact(room,msgData);
      cancelReply();
    }catch(e){
      alert('Upload échoué');
    }
    document.getElementById('typing').innerText = '';
  }
}
document.getElementById('photoInput').onchange = e => uploadFile(e.target.files[0], 'image');
document.getElementById('videoInput').onchange = e => uploadFile(e.target.files[0], 'video');
document.getElementById('fileInput').onchange = e => uploadFile(e.target.files[0], 'file');

msgInput.addEventListener('keydown',e=>{
  if(e.key==='Enter' &&!e.shiftKey){
    e.preventDefault();
    send();
  }
});

setInterval(()=>{

    let time = parseInt(msgDiv.dataset.time);
    let diffMinutes = (new Date() - new Date(time)) / 1000 / 60;
    if(diffMinutes >= 50){
      msgDiv.querySelector('.msgMenu')?.remove();
    }
  });
}, 30000);

<script>
// VISITE GUIDÉE - FINALE
(function(){
let currentStep = 0;
const steps = [
  {element:'#menuBtn',text:'ÉTAPE 1 : Clique ici pour ouvrir le menu et te connecter avec Google'},
  {element:'#name',text:'ÉTAPE 2 : Écris ton pseudo ici. Exemple: MRPC'},
  {element:'#room',text:'ÉTAPE 3 : Choisis un code room. Ceux qui mettent le MÊME code parlent ensemble'},
  {element:'#saveRoomBtn',text:'ÉTAPE 4 : Clique Entrer pour rejoindre le chat'}
];

function toggleGuideBtn(show){
  const btn = document.getElementById('startTour');
  if(btn) btn.style.display = show? 'block' : 'none';
}

window.startGuide = function(){
  // Reset pour pouvoir relancer
  localStorage.removeItem('tourDone');
  // Force retour accueil
  document.getElementById('chatPage').style.display = 'none';
  document.getElementById('contactsPage').style.display = 'flex';
  if(typeof leaveRoom === 'function') leaveRoom();
  toggleGuideBtn(true);

  currentStep = 0;
  document.getElementById('tourOverlay').style.display = 'block';
  setTimeout(showStep,100);
}

function showStep(){
  if(currentStep >= steps.length) return endGuide();
  const step = steps[currentStep];
  const el = document.querySelector(step.element);

  if(!el || el.offsetParent === null){
    nextStep();
    return;
  }

  const rect = el.getBoundingClientRect();
  const spotlight = document.getElementById('tourSpotlight');
  const box = document.getElementById('tourBox');

  spotlight.style.top = rect.top - 8 + 'px';
  spotlight.style.left = rect.left - 8 + 'px';
  spotlight.style.width = rect.width + 16 + 'px';
  spotlight.style.height = rect.height + 16 + 'px';

  let boxTop = rect.bottom + 15;
  let boxLeft = rect.left;
  if(boxTop + 150 > window.innerHeight) boxTop = rect.top - 165;
  if(boxLeft + 280 > window.innerWidth) boxLeft = window.innerWidth - 300;
  if(boxLeft < 10) boxLeft = 10;

  box.style.top = boxTop + 'px';
  box.style.left = boxLeft + 'px';

  document.getElementById('tourText').innerText = step.text;
  document.getElementById('tourCount').innerText = `${currentStep + 1}/${steps.length}`;
  document.getElementById('tourNext').innerText = currentStep === steps.length - 1? 'Terminer' : 'Suivant';
}

window.nextStep = function(){
  currentStep++;
  showStep();
}

window.endGuide = function(){
  document.getElementById('tourOverlay').style.display = 'none';
  localStorage.setItem('tourDone','1');
}

// GÈRE L'AFFICHAGE DU BOUTON
document.addEventListener('DOMContentLoaded',()=>{
  // Lance auto au 1er démarrage
  setTimeout(()=>{
    if(!localStorage.getItem('tourDone')) startGuide();
  },3500);

  // Cache le bouton quand on ouvre un chat
  const checkChat = setInterval(()=>{
    const chatPage = document.getElementById('chatPage');
    if(chatPage){
      const observer = new MutationObserver(()=>{
        const isInChat = chatPage.style.display === 'flex';
        toggleGuideBtn(!isInChat);
      });
      observer.observe(chatPage,{attributes:true,attributeFilter:['style']});
      // Check initial
      toggleGuideBtn(chatPage.style.display!== 'flex');
      clearInterval(checkChat);
    }
  },100);
});
})();
</script>
